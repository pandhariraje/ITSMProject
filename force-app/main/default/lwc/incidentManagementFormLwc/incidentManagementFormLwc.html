<template>
    <lightning-card title={label} icon-name="standard:incident">
        <div class="slds-p-around_medium slds-is-relative">
            <!-- Spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </template>

            <!-- Error Banner -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <h2>{error}</h2>
                </div>
            </template>

            <!-- Success State -->
            <template if:true={isSuccess}>
                <div class="slds-align_absolute-center slds-m-around_large slds-flex-column">
                    <lightning-icon icon-name="action:approval" size="large" alternative-text="Success"></lightning-icon>
                    <div class="slds-text-heading_medium slds-m-top_medium">Incident Created Successfully</div>
                    <div class="slds-text-body_regular slds-m-top_small">Incident Number: <strong>{incidentNumber}</strong></div>
                    <div class="slds-m-top_medium">
                        <a href={incidentRecordUrl} target="_blank" class="slds-button slds-button_brand">View Incident</a>
                    </div>
                </div>
            </template>

            <!-- Form Fields -->
            <template if:false={isSuccess}>
                <div class="slds-form slds-form_stacked">
                    <template for:each={fields} for:item="field">
                        <div key={field.fieldName} class="slds-form-element slds-m-bottom_small">
                            <!-- Picklist (Combobox) -->
                            <template if:true={field.isPicklist}>
                                <lightning-combobox
                                    label={field.label}
                                    value={field.value}
                                    data-name={field.fieldName}
                                    options={field.options}
                                    onchange={handleFieldChange}
                                    required={field.isRequired}
                                    message-when-value-missing="This field is required">
                                </lightning-combobox>
                            </template>

                            <!-- Long Text Area (Textarea) -->
                            <template if:true={field.isTextarea}>
                                <lightning-textarea
                                    label={field.label}
                                    value={field.value}
                                    data-name={field.fieldName}
                                    onchange={handleFieldChange}
                                    required={field.isRequired}
                                    message-when-value-missing="This field is required">
                                </lightning-textarea>
                            </template>

                            <!-- Text Input -->
                            <template if:true={field.isInput}>
                                <lightning-input
                                    type="text"
                                    label={field.label}
                                    value={field.value}
                                    data-name={field.fieldName}
                                    onchange={handleFieldChange}
                                    required={field.isRequired}
                                    message-when-value-missing="This field is required">
                                </lightning-input>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Footer Buttons -->
                <div class="slds-m-top_medium slds-align_absolute-center">
                    <button class="slds-button slds-button_neutral slds-m-right_small" onclick={handleCancel}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleSubmit} disabled={isSubmitDisabled}>Submit</button>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
