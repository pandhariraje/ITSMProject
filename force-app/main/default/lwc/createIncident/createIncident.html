<template>
    <lightning-card title="Create Incident" icon-name="standard:incident">

        <!-- Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Creating Incident"
                size="medium">
            </lightning-spinner>
        </template>

        <div class="slds-p-around_medium">

            <div class="slds-grid slds-wrap slds-gutters">

                <!-- Subject -->
                <div class="slds-col slds-size_1-of-1">
                    <lightning-input
                        label="Subject"
                        value={subject}
                        required
                        onchange={handleSubject}>
                    </lightning-input>
                </div>

                <!-- Description -->
                <div class="slds-col slds-size_1-of-1">
                    <lightning-textarea
                        label="Description"
                        value={description}
                        onchange={handleDescription}>
                    </lightning-textarea>
                </div>

                <!-- Status -->
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Status"
                        value={status}
                        options={statusOptions}
                        required
                        onchange={handleStatus}>
                    </lightning-combobox>
                </div>

                <!-- Priority -->
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Priority"
                        value={priority}
                        options={priorityOptions}
                        required
                        onchange={handlePriority}>
                    </lightning-combobox>
                </div>

                <!-- Urgency -->
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Urgency"
                        value={urgency}
                        options={urgencyOptions}
                        required
                        onchange={handleUrgency}>
                    </lightning-combobox>
                </div>

                <!-- Impact -->
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox
                        label="Impact"
                        value={impact}
                        options={impactOptions}
                        required
                        onchange={handleImpact}>
                    </lightning-combobox>
                </div>

            </div>

            <div class="slds-m-top_large slds-align_absolute-center">

                <lightning-button
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_small">
                </lightning-button>

                <lightning-button
                    variant="brand"
                    label="Create Incident"
                    onclick={handleCreate}
                    disabled={isLoading}>
                </lightning-button>

            </div>

        </div>

    </lightning-card>
</template>
