<template>
    <lightning-card title="Create Incident" icon-name="standard:incident">
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <lightning-input
                label="Subject"
                value={subject}
                onchange={handleSubject}
                required>
            </lightning-input>

            <lightning-textarea
                label="Description"
                value={description}
                onchange={handleDescription}
                class="slds-m-top_small"
                required>
            </lightning-textarea>

            <lightning-combobox
                label="Status"
                value={status}
                options={statusOptions}
                onchange={handleStatus}
                class="slds-m-top_small">
            </lightning-combobox>

            <lightning-combobox
                label="Priority"
                value={priority}
                options={priorityOptions}
                onchange={handlePriority}
                class="slds-m-top_small">
            </lightning-combobox>

            <lightning-combobox
                label="Urgency"
                value={urgency}
                options={urgencyOptions}
                onchange={handleUrgency}
                class="slds-m-top_small">
            </lightning-combobox>

            <lightning-combobox
                label="Impact"
                value={impact}
                options={impactOptions}
                onchange={handleImpact}
                class="slds-m-top_small">
            </lightning-combobox>

            <template if:true={customError}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-m-top_small" role="alert">
                    <h2>{customError}</h2>
                </div>
            </template>

            <template if:true={isSubmitted}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_success slds-m-top_small" role="alert">
                    <h2>Incident {incidentNumber} created successfully!</h2>
                </div>
            </template>


        </div>
    </lightning-card>
</template>
