<template>
    <div class="slds-form-element slds-p-around_small">
        <label class="slds-form-element__label slds-text-title_bold" for="status-combobox">Select Visit Status</label>
        <div class="slds-form-element__control">
            <lightning-combobox
                id="status-combobox"
                name="statusValue"
                label="Status"
                variant="label-hidden"
                value={statusValue}
                placeholder="Select status..."
                options={statusOptions}
                onchange={handleStatusChange}
                required>
            </lightning-combobox>
        </div>
    </div>
</template>
